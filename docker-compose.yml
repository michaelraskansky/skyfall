##
## docker compose up --build
##
## This spins up the tracker worker alongside a local DynamoDB instance.
## For production on AWS, replace the local DynamoDB service with
## the real DynamoDB service and run the worker on EC2 / ECS / Fargate.
##

version: "3.9"

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8001:8000"
    command: "-jar DynamoDBLocal.jar -inMemory"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  setup-dynamodb:
    image: amazon/aws-cli:latest
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      aws dynamodb create-table
        --endpoint-url http://dynamodb-local:8000
        --table-name skyfall-events
        --key-schema
          AttributeName=pk,KeyType=HASH
          AttributeName=sk,KeyType=RANGE
        --attribute-definitions
          AttributeName=pk,AttributeType=S
          AttributeName=sk,AttributeType=S
        --billing-mode PAY_PER_REQUEST

  tracker:
    build: .
    depends_on:
      setup-dynamodb:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000
      DYNAMODB_TABLE_NAME: skyfall-events
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: us-east-1
