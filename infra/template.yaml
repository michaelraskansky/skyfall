AWSTemplateFormatVersion: "2010-09-09"
Description: "Skyfall - Aerospace Debris & Industrial Anomaly Tracker"

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for ECS tasks (must be in at least 2 AZs)

  ImageUri:
    Type: String
    Description: ECR image URI (e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/skyfall:latest)

  FirmsApiKey:
    Type: String
    NoEcho: true
    Default: ""

  AdsbApiKey:
    Type: String
    NoEcho: true
    Default: ""

  SlackWebhookUrl:
    Type: String
    NoEcho: true
    Default: ""

  DiscordWebhookUrl:
    Type: String
    NoEcho: true
    Default: ""

  SpacetrackIdentity:
    Type: String
    Default: ""

  SpacetrackPassword:
    Type: String
    NoEcho: true
    Default: ""

Resources:
  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: skyfall-events
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/skyfall
      RetentionInDays: 30

  AppSecrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: skyfall/app-secrets
      SecretString: !Sub |
        {
          "FIRMS_API_KEY": "${FirmsApiKey}",
          "ADSB_API_KEY": "${AdsbApiKey}",
          "SLACK_WEBHOOK_URL": "${SlackWebhookUrl}",
          "DISCORD_WEBHOOK_URL": "${DiscordWebhookUrl}",
          "SPACETRACK_IDENTITY": "${SpacetrackIdentity}",
          "SPACETRACK_PASSWORD": "${SpacetrackPassword}"
        }

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: skyfall-task-execution
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: secrets-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref AppSecrets

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: skyfall-task
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: bedrock-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: "*"
        - PolicyName: dynamodb-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:DeleteItem
                Resource: !GetAtt EventsTable.Arn

  # -- Networking --
  VpcLinkSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Skyfall VPC Link
      VpcId: !Ref VpcId

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Skyfall ECS service
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref VpcLinkSecurityGroup
          Description: Allow only API Gateway VPC Link traffic

  # -- Cloud Map (service discovery for API Gateway) --
  ServiceDiscoveryNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: skyfall.local
      Vpc: !Ref VpcId

  ServiceDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: webhook
      NamespaceId: !GetAtt ServiceDiscoveryNamespace.Id
      DnsConfig:
        DnsRecords:
          - Type: SRV
            TTL: 10
          - Type: A
            TTL: 10

  # -- API Gateway HTTP API --
  VpcLink:
    Type: AWS::ApiGatewayV2::VpcLink
    Properties:
      Name: skyfall-vpc-link
      SubnetIds: !Ref SubnetIds
      SecurityGroupIds:
        - !Ref VpcLinkSecurityGroup

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: skyfall-api
      ProtocolType: HTTP

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: HTTP_PROXY
      IntegrationUri: !GetAtt ServiceDiscoveryService.Arn
      IntegrationMethod: ANY
      ConnectionType: VPC_LINK
      ConnectionId: !Ref VpcLink
      PayloadFormatVersion: "1.0"

  ApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "$default"
      Target: !Sub "integrations/${ApiIntegration}"

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  # -- ECS --
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: skyfall
      CapacityProviders:
        - FARGATE

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: skyfall
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "512"
      Memory: "1024"
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: skyfall
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 80
              Protocol: tcp
          Environment:
            - Name: AWS_REGION
              Value: !Ref "AWS::Region"
            - Name: DYNAMODB_TABLE_NAME
              Value: !Ref EventsTable
            - Name: LOG_FORMAT
              Value: json
            - Name: PORT
              Value: "80"
          Secrets:
            - Name: FIRMS_API_KEY
              ValueFrom: !Sub "${AppSecrets}:FIRMS_API_KEY::"
            - Name: ADSB_API_KEY
              ValueFrom: !Sub "${AppSecrets}:ADSB_API_KEY::"
            - Name: SLACK_WEBHOOK_URL
              ValueFrom: !Sub "${AppSecrets}:SLACK_WEBHOOK_URL::"
            - Name: DISCORD_WEBHOOK_URL
              ValueFrom: !Sub "${AppSecrets}:DISCORD_WEBHOOK_URL::"
            - Name: SPACETRACK_IDENTITY
              ValueFrom: !Sub "${AppSecrets}:SPACETRACK_IDENTITY::"
            - Name: SPACETRACK_PASSWORD
              ValueFrom: !Sub "${AppSecrets}:SPACETRACK_PASSWORD::"
            - Name: TELEGRAM_API_ID
              ValueFrom: !Sub "${AppSecrets}:TELEGRAM_API_ID::"
            - Name: TELEGRAM_API_HASH
              ValueFrom: !Sub "${AppSecrets}:TELEGRAM_API_HASH::"
            - Name: TELEGRAM_SESSION
              ValueFrom: !Sub "${AppSecrets}:TELEGRAM_SESSION::"
            - Name: TELEGRAM_CHANNELS
              ValueFrom: !Sub "${AppSecrets}:TELEGRAM_CHANNELS::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: skyfall

  ECSService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: skyfall
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !Ref ServiceSecurityGroup
      ServiceRegistries:
        - RegistryArn: !GetAtt ServiceDiscoveryService.Arn
          ContainerName: skyfall
          ContainerPort: 80

Outputs:
  WebhookEndpoint:
    Description: Emergency webhook URL
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/api/v1/emergency"

  HealthEndpoint:
    Description: Health check URL
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/health"

  DynamoDBTable:
    Description: DynamoDB table name
    Value: !Ref EventsTable

  ECRRepository:
    Description: ECR repository URI
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/skyfall"
